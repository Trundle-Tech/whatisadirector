[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Serverless function endpoints are available under /api/* (e.g. /api/vertex)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: let the React client handle all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
